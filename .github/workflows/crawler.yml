name: Job Crawler

on:
  schedule:
    - cron: "0 23 * * *" # 한국시간 오전 8시 (UTC 23시)
    - cron: "0 9 * * *"  # 한국시간 오후 6시 (UTC 9시)
  workflow_dispatch: # 수동 실행

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build crawler
        run: npm run build --workspace=apps/crawler

      - name: Run crawler
        run: node dist/index.js
        working-directory: apps/crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MY_JOB_CATEGORY: ${{ vars.MY_JOB_CATEGORY }}
          MATCH_SCORE_THRESHOLD: ${{ vars.MATCH_SCORE_THRESHOLD }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
