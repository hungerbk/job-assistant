name: Job Crawler

on:
  schedule:
    - cron: "0 23 * * *" # 한국시간 오전 8시 (UTC 23시)
    - cron: "0 9 * * *"  # 한국시간 오후 6시 (UTC 9시)
  workflow_dispatch: # 수동 실행

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/crawler

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build crawler
        run: npm run build --workspace=apps/crawler

      - name: Run crawler
        run: node dist/index.js
        working-directory: apps/crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MY_CAREER_YEARS: ${{ vars.MY_CAREER_YEARS }}
          MY_SKILLS: ${{ vars.MY_SKILLS }}
          MY_PREFERRED_COMPANY_SIZE: ${{ vars.MY_PREFERRED_COMPANY_SIZE }}
          MY_EXCLUDED_CONDITIONS: ${{ vars.MY_EXCLUDED_CONDITIONS }}
          MY_MIN_SALARY: ${{ vars.MY_MIN_SALARY }}
          MY_JOB_CATEGORY: ${{ vars.MY_JOB_CATEGORY }}
          MATCH_SCORE_THRESHOLD: ${{ vars.MATCH_SCORE_THRESHOLD }}
